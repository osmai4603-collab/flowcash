Name: Flutter Windows CI

on:
  push:
    branches: [ main, master ] # سيبدأ البناء تلقائياً عند رفع الكود لفرع main أو master

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8' # إصدار فلاتر المطابق لجهازك

      - name: Get Dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Support
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows

      - name: Build Windows Application (Release)
        run: flutter build windows --release

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-Windows-App
          path: build/windows/x64/runner/Release/